server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bulletin_board_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show-sql: true
        format_sql: true

  sql:
    init:
      # Режим выполнения скриптов. "always" означает выполнять их при каждом запуске
      mode: always
      # Указываем Spring Boot, где лежит наш файл со скриптом создания таблиц
      schema-locations: classpath:schema.sql

logging:
  level:
    root: INFO
    com.boardmaster: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE